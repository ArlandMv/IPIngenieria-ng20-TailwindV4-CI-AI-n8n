<section
  class="relative overflow-hidden bg-gradient-to-br from-white to-primary-400 py-16 lg:py-20 dark:from-gray-900 dark:to-gray-800"
>
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="mb-16 text-center">
      <p
        class="mb-4 text-3xl font-bold text-gray-900 lg:text-4xl dark:text-white"
      >
        {{ title }}
      </p>
      <p class="subtitle">
        {{ subtitle }}
      </p>
    </div>

    <div class="relative grid gap-8 md:grid-cols-3">
      <div
        class="absolute top-16 right-1/4 left-1/4 hidden h-0.5 bg-primary-400 md:block dark:bg-primary-600"
      ></div>
      @for (step of steps; track $index) {
        <div class="relative text-center">
          <div
            class="relative z-10 mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-full bg-primary-500 text-2xl font-bold text-white"
          >
            {{ $index + 1 }}
          </div>
          <p class="mb-4 text-2xl font-semibold text-gray-900 dark:text-white">
            {{ step.step }}
          </p>
          <p class="text-gray-600 dark:text-gray-300">
            {{ step.description }}
          </p>
        </div>
      }
    </div>
  </div>
</section>
