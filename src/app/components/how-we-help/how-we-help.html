<section class="relative overflow-hidden bg-gradient-to-tr from-white to-primary-400 py-16 lg:py-20 dark:from-gray-900 dark:to-gray-800" id="how-we-help">
  <div class="mx-auto max-w-screen-xl px-4 py-12 lg:py-20">
    <div class="mb-10 text-center">
      <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white">
        {{ title }}
      </h2>
    </div>
    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-4">
      @for (item of benefits; track item) {
        <div
          class="rounded-lg border bg-gray-50 p-6 shadow-md transition-transform transform hover:scale-105 dark:border-gray-700 dark:bg-gray-800"
        >
          <div class="flex items-start">
            <span
              class="me-3 inline-flex h-10 w-10 items-center justify-center rounded-full bg-blue-100 text-blue-700"
            >
              <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path
                  fill-rule="evenodd"
                  d="M16.707 5.293a1 1 0 010 1.414L8.414 15 5 11.586a1 1 0 011.414-1.414L8.414 12.172l7.879-7.879a1 1 0 011.414 0z"
                  clip-rule="evenodd"
                />
              </svg>
            </span>
            <p class="text-gray-700 dark:text-gray-300">{{ item }}</p>
          </div>
        </div>
      }
      
    </div>
  </div>
</section>
