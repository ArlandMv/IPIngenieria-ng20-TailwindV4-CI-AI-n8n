<section
  class="relative overflow-hidden bg-gradient-to-tr from-white to-primary-400 py-16 lg:py-20 dark:from-gray-900 dark:to-gray-800"
  id="testimonials"
>
  <div class="mx-auto max-w-screen-xl px-4 py-12 lg:py-20">
    <div class="mb-8 text-center">
      <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white">
        Clientes
      </h2>
      <p class="text-gray-600 dark:text-gray-300">
        Historias reales de continuidad y eficiencia.
      </p>
    </div>
    <div class="grid gap-6 md:grid-cols-2">
      @for (item of testimonials; track item) {
        <figure
          class="rounded-lg border border-gray-200 bg-white p-6 dark:border-gray-700 dark:bg-gray-800"
        >
          <svg
            class="mb-3 h-8 w-8 text-blue-600 dark:text-blue-400"
            viewBox="0 0 24 27"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M3.514 0C1.575 0 0 1.575 0 3.514v6.486C0 13.94 2.06 16 4.571 16H8V8H3V6h5V0H3.514zM16 0c-1.939 0-3.514 1.575-3.514 3.514v6.486C12.486 13.94 14.546 16 17.057 16H20.486V8h-5V6h5V0H16z"
            />
          </svg>
          <blockquote class="text-gray-700 italic dark:text-gray-300">
            “{{ item.quote }}”
          </blockquote>
          <figcaption
            class="mt-4 text-sm font-medium text-gray-900 dark:text-white"
          >
            {{ item.author }}
          </figcaption>
          <!-- todo: add these soon 
          <figcaption
            class="mt-4 text-sm font-medium text-gray-900 dark:text-white"
          >
            {{ item.company }}
          </figcaption>
          <figcaption
            class="mt-4 text-sm font-medium text-gray-900 dark:text-white"
          >
            {{ item.position }}
          </figcaption>
          <figcaption
            class="mt-4 text-sm font-medium text-gray-900 dark:text-white"
          >
            {{ t.date }}
          </figcaption>
          -->
        </figure>
      }
    </div>
  </div>
</section>
