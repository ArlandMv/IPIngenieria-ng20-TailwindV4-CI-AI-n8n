<section
  id="about"
  class="relative bg-gray-50 bg-gradient-to-tl from-primary-400 to-gray-50 py-12 md:h-1/2 lg:h-1/3 lg:py-20 dark:from-gray-900 dark:to-gray-800"
>
  <div class="relative mx-auto max-w-7xl px-6 py-8 lg:px-8 lg:py-8">
    <!-- Section Title -->
    <h2
      class="mb-6 text-center text-3xl font-extrabold text-gray-900 md:text-4xl dark:text-white"
    >
      {{ title_about }}
    </h2>

    <!-- Description -->
    <p class="subtitle mx-auto max-w-3xl text-lg leading-relaxed pb-8 md:pb-12">
      {{ description_about }}
    </p>

    <!-- CLIENTS -->
    <div
      class="mx-auto w-full rounded-2xl bg-gray-50 px-6 py-8 shadow-lg lg:py-8 dark:bg-gray-800"
      class="relative rounded-2xl border-2 border-primary-500 bg-primary-200 p-8 dark:bg-primary-900/20"
    >
      <div class="absolute -top-4 left-1/2 -translate-x-1/2 transform">
        <span
          class="rounded-full bg-primary-500 px-4 py-1 text-sm font-semibold text-white"
          >Clientes de Trayectoria</span
        >
      </div>

      <div class="xxl:grid-cols-6 grid grid-cols-3 gap-8 md:grid-cols-3">
        <!-- lg:grid-cols-4 -->

        <!-- Punto IT -->
        <a
          href="#testimonials"
          class="flex items-center justify-center grayscale transition hover:grayscale-0"
        >
          <img
            src="logos/logo-punto-it-2.png"
            alt="Punto IT logo"
            class="lg:min-h-30"
          />
        </a>

        <!-- ACHS -->
        <a
          href="#testimonials"
          class="flex items-center justify-center grayscale transition hover:grayscale-0"
        >
          <img
            src="/logos/logo-achs.svg"
            alt="ACHS logo"
            class="h-12 lg:min-h-20"
          />
        </a>

        <!-- CHILQUINTA -->
        <a
          href="#testimonials"
          class="flex items-center justify-center grayscale transition hover:grayscale-0"
        >
          <img
            src="/logos/logo-chilquinta.svg"
            alt="Chilquinta logo"
            class="h-12 lg:min-h-20"
          />
        </a>
      </div>
    </div>
  </div>
</section>
