<section class="py-20 bg-primary-50 dark:bg-gray-800" id="cotizacion">
  <div class="mx-auto px-6 lg:px-8 max-w-4xl">
    <div class="text-center mb-12">
      <p
        class="text-3xl lg:text-4xl font-bold text-gray-900 mb-4 dark:text-white"
      >
        Solicitar Información
      </p>
      <p class="text-xl text-gray-600 dark:text-gray-300">
        Complete el formulario y nos pondremos en contacto en menos de 24 horas
      </p>
    </div>
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl p-8">
      <form class="md:grid-cols-2 grid gap-6">
        <div>
          <label
            for="nombre"
            class="text-sm font-medium text-gray-700 mb-2 block dark:text-gray-300"
            >Nombre Completo *</label
          >
          <input
            name="nombre"
            required=""
            type="text"
            placeholder="Su nombre completo"
            class="border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:text-white w-full px-4 py-3 rounded-lg dark:bg-gray-800"
            id="nombre"
          />
        </div>
        <div>
          <label
            for="empresa"
            class="text-sm font-medium text-gray-700 mb-2 block dark:text-gray-300"
            >Empresa *</label
          >
          <input
            name="empresa"
            required=""
            type="text"
            placeholder="Nombre de su empresa"
            class="border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:text-white w-full px-4 py-3 rounded-lg dark:bg-gray-800"
            id="empresa"
          />
        </div>
        <div>
          <label
            for="email"
            class="text-sm font-medium text-gray-700 mb-2 block dark:text-gray-300"
            >Email Corporativo *</label
          >
          <input
            name="email"
            required=""
            type="email"
            placeholder="correo@empresa.com"
            class="border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:text-white w-full px-4 py-3 rounded-lg dark:bg-gray-800"
            id="email"
          />
        </div>
        <div>
          <label
            for="servicio"
            class="text-sm font-medium text-gray-700 mb-2 block dark:text-gray-300"
            >Servicio de Interés *</label
          >
          <select
            name="servicio"
            required=""
            type="select-one"
            class="border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:text-white w-full px-4 py-3 rounded-lg dark:bg-gray-800"
            id="servicio"
          >
            <option value="">Seleccionar servicio</option>
            <option value="generative-ai">Generative AI Integrations</option>
            <option value="ocr-ai">AI File Interactions with OCR</option>
            <option value="ai-strategy">AI Strategy &amp; Consulting</option>
            <option value="api-integrations">API &amp; CRM Integrations</option>
            <option value="chatbots">Custom Chatbots &amp; Automations</option>
            <option value="consultoria">Consultoría General</option>
          </select>
        </div>
        <div class="md:col-span-2">
          <label
            for="mensaje"
            class="text-sm font-medium text-gray-700 mb-2 block dark:text-gray-300"
            >Cuéntenos sobre su proyecto</label
          >
          <textarea
            name="mensaje"
            rows="4"
            type="textarea"
            placeholder="Describa brevemente su situación actual y objetivos..."
            class="w-full px-4 py-3 rounded-lg dark:bg-gray-800 border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:text-white"
            id="mensaje"
          ></textarea>
        </div>
        <div class="md:col-span-2">
          <button
            type="submit"
            class="hover:bg-primary-600 dark:hover:bg-primary-700 transition-colors w-full bg-primary-500 dark:bg-primary-600 text-white px-8 py-4 rounded-lg font-semibold text-lg"
          >
            Enviar Solicitud
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
