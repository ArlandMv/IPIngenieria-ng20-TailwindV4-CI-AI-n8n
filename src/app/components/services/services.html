<section
  class="relative bg-gray-50 bg-gradient-to-bl from-primary-400 to-gray-50 py-12 md:h-1/2 lg:h-1/3 lg:py-20 dark:from-gray-900 dark:to-gray-800"
  [id]="sectionId"
>
  <div class="mx-auto max-w-screen-xl px-4 py-12 lg:py-20">
    <div class="mb-8 text-center">
      <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white">
        <span class="text-primary-500"> Servicios TI </span> para tu empresa,
        negocio o comunidad.
      </h2>
      <p class="subtitle mt-2">{{ subtitle }}</p>
    </div>
    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-2">
      @for (block of blocks(); track block) {
        <article
          class="group flex-column relative flex h-full flex-wrap rounded-lg border border-gray-200 bg-gray-50 p-6 shadow-sm hover:shadow-md dark:border-gray-700 dark:bg-gray-800"
        >
          <h3 class="mb-3 text-xl font-semibold text-gray-900 dark:text-white">
            {{ block.title }}
          </h3>
          <ul class="mb-8 space-y-2">
            @for (item of block.items; track item) {
              <li class="flex items-start">
                <svg
                  class="me-2 mt-1 h-5 w-5 text-blue-600 dark:text-blue-400"
                  fill="currentColor"
                  viewBox="0 0 20 20"
                >
                  <path
                    fill-rule="evenodd"
                    d="M16.707 5.293a1 1 0 010 1.414L8.414 15 5 11.586a1 1 0 011.414-1.414L8.414 12.172l7.879-7.879a1 1 0 011.414 0z"
                    clip-rule="evenodd"
                  ></path>
                </svg>
                <span class="text-gray-700 dark:text-gray-300">{{ item }}</span>
              </li>
            }
          </ul>
          <!-- (click)="requestMoreInfo(service.title)"
          class= absolute bottom-6 right-6  
          -->
          <a
            href="#contact"
            class="pointer-events-none absolute right-6 bottom-6 rounded-lg bg-primary-500 px-8 py-3 font-semibold text-white opacity-0 transition-opacity duration-300 ease-in-out group-hover:pointer-events-auto group-hover:opacity-100 hover:bg-primary-600"
            >más información</a
          >
        </article>
      }
    </div>
  </div>
</section>
