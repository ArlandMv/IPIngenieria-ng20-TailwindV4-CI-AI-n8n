<section class="relative bg-gray-50 bg-gradient-to-bl from-primary-500 to-gray-50 py-12 md:h-1/2 lg:h-1/3 lg:py-20 dark:from-gray-900 dark:to-gray-800" [id]="sectionId">
    <div class="max-w-screen-xl mx-auto px-4 py-12 lg:py-20">
      <div class="mb-8 text-center">
        <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white">Servicios TI</h2>
        <p class="mt-2 text-gray-600 dark:text-gray-300">Infraestructura, seguridad y monitoreo para tu operación.</p>
      </div>
      <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-2">
        @for (block of blocks(); track block) {
          <article class="p-6 border border-gray-200 rounded-lg shadow-sm bg-gray-50 hover:shadow-md
                        dark:bg-gray-800 dark:border-gray-700">
            <h3 class="text-xl font-semibold text-gray-900 dark:text-white mb-3">{{ block.title }}</h3>
            <ul class="space-y-2">
              @for (item of block.items; track item) {
                <li class="flex items-start">
                  <svg class="w-5 h-5 text-blue-600 mt-1 me-2 dark:text-blue-400" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                      d="M16.707 5.293a1 1 0 010 1.414L8.414 15 5 11.586a1 1 0 011.414-1.414L8.414 12.172l7.879-7.879a1 1 0 011.414 0z"
                      clip-rule="evenodd"></path>
                  </svg>
                  <span class="text-gray-700 dark:text-gray-300">{{ item }}</span>
                </li>
              }
            </ul>
          </article>
        }
      </div>
    </div>
  </section>
