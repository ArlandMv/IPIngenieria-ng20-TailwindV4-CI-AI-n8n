<header
  class="sticky top-0 z-50 border-b border-gray-200/50 bg-white/95 backdrop-blur-sm dark:border-gray-700/50 dark:bg-gray-900/95"
>
  <nav class="mx-auto max-w-7xl px-6 lg:px-8">
    <!-- Desktop navigation menu -->
    <div class="flex h-16 items-center justify-between">
      <div class="flex-shrink-0">
        <img
          alt="IPIngeniería.net"
          src="logo-ipingenieria-1024x353.png"
          class="h-8 w-auto"
        />
      </div>

      <div class="hidden md:block">
        <div class="desktop-menu">
          @for (item of menuItems(); track item.href) {
            <a
              [href]="item.href"
              class="px-3 py-2 text-sm font-medium text-gray-700 transition-colors hover:text-primary-600 dark:text-gray-300 dark:hover:text-primary-400"
              >{{ item.label }}</a
            >
          }
        </div>
      </div>
      <div class="hidden md:block">
        <a
          href="#contact"
          class="rounded-lg bg-primary-500 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-primary-600 dark:bg-primary-600 dark:hover:bg-primary-700"
          >Evaluación Gratuita</a
        >
      </div>

      <!-- MOBILE MENU-->
      <div class="mobile-menu md:hidden">
        <button
          (click)="toggleMobileMenu()"
          type="button"
          class="text-gray-700 hover:text-primary-600 dark:text-gray-300 dark:hover:text-primary-400"
        >
          <span class="sr-only">Open main menu</span>
          <svg
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            id="mobile-svg"
          >
            @if (isMobileMenuOpen()) {
              <!-- Heroicon: outline/x -->
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            } @else {
              <!-- Heroicon: outline/menu -->
              >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              ></path>
            }
          </svg>
        </button>
        <!-- Mobile navigation menu -->
        @if (isMobileMenuOpen()) {
          <div
            class="absolute inset-x-0 top-16 bg-white/95 py-3 shadow-lg backdrop-blur-sm dark:bg-gray-900/95"
          >
            <div class="space-y-1 px-2 pt-2 pb-3 sm:px-3">
              @for (item of menuItems(); track item.href) {
                <a
                  [href]="item.href"
                  (click)="toggleMobileMenu()"
                  class="mobile-menu-item"
                  >{{ item.label }}</a
                >
              }
            </div>
          </div>
        }
      </div>
    </div>
  </nav>
</header>
